<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Malak ❤️</title>
    <style>
        body { margin: 0; background: #fff0f5; font-family: 'Segoe UI', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Lock Screen */
        #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #fce4ec; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        input { padding: 15px; border-radius: 25px; border: 2px solid #ec407a; margin: 10px; text-align: center; }
        button { padding: 15px 40px; background: #ec407a; border: none; border-radius: 25px; color: white; cursor: pointer; }

        /* Main Content */
        #content { display: none; padding: 20px; }
        .hero { font-size: 2.5rem; color: #d81b60; margin: 20px 0; }
        .card { background: white; padding: 15px; border-radius: 20px; margin: 20px auto; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 15px; }
        .footer { font-size: 1.5rem; color: #ec407a; margin-top: 40px; padding: 20px; font-weight: bold; }
        
        /* Hearts Animation */
        .heart { position: fixed; color: #ec407a; opacity: 0.6; pointer-events: none; animation: fall 5s linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1>Welcome, Malak ❤️</h1>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkPass()">Unlock Surprise</button>
    </div>

    <div id="content">
        <h1 class="hero">Happy Birthday Malak 🎂</h1>
        
        <div class="card">
            <img src="photo1.jpg" alt="Malak">
            <p>To my beautiful Malak, happy birthday!</p>
        </div>
        <div class="card">
            <img src="photo2.jpg" alt="Us">
            <p>Every moment with you is a treasure.</p>
        </div>

        <div class="footer">
            <h2>💌 To Malak</h2>
            <p>Malak, you are the best thing that ever happened to me. I love you forever! - Mohamed ❤️</p>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === 'love') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                setInterval(createHeart, 500);
            } else { alert("Wrong password!"); }
        }
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️'; h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
    </script>
</body>
</html>
