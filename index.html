<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Malak ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd1dc,#ffb6c1,#ffc0cb);
overflow-x:hidden;
text-align:center;
color:white;
}

/* LOCK SCREEN */
#lock-screen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd1dc);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

#lock-screen h1{
font-size:2.5rem;
text-shadow:0 0 20px #ff4d88;
}

#password{
margin-top:20px;
padding:15px;
width:260px;
border:none;
border-radius:30px;
text-align:center;
outline:none;
}

#lock-screen button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
}

/* MAIN */
.container{
display:none;
padding:20px;
}

.hero{
padding-top:60px;
}

.hero h1{
font-size:2.5rem;
}

.hero h2{
margin-top:10px;
font-size:1.5rem;
}

.date{
margin-top:10px;
}

.main-img{
width:80%;
max-width:400px;
border-radius:25px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* CARDS */
.card{
background:rgba(255,255,255,0.15);
margin:20px auto;
padding:15px;
border-radius:20px;
max-width:350px;
backdrop-filter:blur(10px);
}

.card img{
width:100%;
border-radius:15px;
}

/* HEARTS */
.heart{
position:fixed;
color:#ff4d88;
font-size:20px;
animation:up 6s linear infinite;
pointer-events:none;
}

@keyframes up{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* MUSIC BUTTON */
#musicBtn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff4d88;
border:none;
padding:10px 25px;
border-radius:50px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
<h1>💖 Happy Birthday Malak 💖</h1>
<p>اكتب الباسورد</p>

<input type="text" id="password" placeholder="love">
<button onclick="checkPass()">افتحي المفاجأة 🎁</button>
</div>

<!-- MUSIC -->
<audio id="bg-music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="container" id="main-content">

<div class="hero">
<h1>💖 Mohamed & Malak 💖</h1>
<h2>🎂 Happy Birthday Malak 🎂</h2>
<div class="date">28 / 06 / 2005</div>

<img class="main-img" src="3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg">
</div>

<div class="card">
<img src="3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg">
<p>أجمل بداية وأجمل حب ❤️</p>
</div>

<div class="card">
<img src="546be1fc-98e4-48ef-8a81-63ae519b0be2.jpeg">
<p>كل لحظة معاكي فرحة 💖</p>
</div>

<div class="card">
<img src="IMG_4418.jpeg">
<p>وجودك نعمة 🌹</p>
</div>

<div class="card">
<img src="ab984390-dba5-437e-898c-b5094c8d6d20.jpeg">
<p>بحبك بكل تفاصيلك 🥰</p>
</div>

<div class="card">
<img src="e622ddf3-b6c8-4430-8158-845f4eadf70f.jpeg">
<p>إنتي حياتي ❤️</p>
</div>

</div>

<!-- MUSIC BUTTON -->
<button id="musicBtn" onclick="document.getElementById('bg-music').play()">
🎵 تشغيل الأغنية
</button>

<script>

/* CHECK PASSWORD - FIXED 100% */
function checkPass(){

const pass = document.getElementById("password").value.trim().toLowerCase();

if(pass === "love"){

document.getElementById("lock-screen").style.display = "none";
document.getElementById("main-content").style.display = "block";

/* PLAY MUSIC (iPhone fix) */
const music = document.getElementById("bg-music");
if(music){
music.play().catch(()=>{});
}

/* HEARTS */
setInterval(()=>{
const h = document.createElement("div");
h.innerHTML="💖";
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);

}else{
alert("الباسورد غلط ❤️");
}
}

/* ENTER KEY */
document.getElementById("password").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkPass();
}
});

</script>

</body>
</html>
