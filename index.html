<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Malak ❤️</title>
    <style>
        body { margin: 0; background: #1a0b2e; color: white; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app-container { width: 100%; max-width: 400px; text-align: center; }
        
        /* شاشة القفل */
        #login-screen { background: #2d1b4e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 10px; border-radius: 10px; border: none; width: 80%; margin: 10px 0; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #ff4081; color: white; cursor: pointer; }

        /* المحتوى المخفي */
        #main-content { display: none; }
        .timer-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; }
        .heart { position: fixed; color: #ff4081; pointer-events: none; animation: float 5s linear infinite; }
        @keyframes float { to { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h2>أدخلي الباسورد يا ملوكة ❤️</h2>
        <input type="text" id="password" placeholder="اكتبي love">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div id="main-content">
        <h1>أحلى ملوكة في الدنيا 💖</h1>
        <div class="timer-box">
            <h3>بقالنا مع بعض:</h3>
            <div id="timer">0 يوم - 0 ساعة - 0 دقيقة</div>
        </div>
        <button onclick="alert('ربنا يخليكي ليا يا روح قلبي ❤️')">رسالة ليكي 💌</button>
    </div>
</div>

<audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>

<script>
    // 1. منطق الباسورد
    function checkPass() {
        if(document.getElementById('password').value.toLowerCase() === 'love') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('bg-music').play();
            setInterval(createHeart, 500);
        } else {
            alert("غلط يا روحي، حاولي تاني! الباسورد love");
        }
    }

    // 2. عداد الوقت (عدل التاريخ هنا: سنة، شهر، يوم)
    function updateTimer() {
        const startDate = new Date("2025-12-21"); // تاريخ البداية
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        document.getElementById('timer').innerText = `${days} يوم - ${hours} ساعة - ${mins} دقيقة`;
    }
    setInterval(updateTimer, 1000);

    // 3. القلوب
    function createHeart() {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.className = 'heart';
        heart.style.left = Math.random() * 100 + 'vw';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
</script>
</body>
</html>
