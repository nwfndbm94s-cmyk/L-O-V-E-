<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Malak ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        /* ألوان رومانسية فاتحة */
        body { margin: 0; background: #fff0f5; color: #5a3e5a; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        
        /* 4. شاشة القفل تظهر بحركة سريعة */
        #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #fce4ec; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hb-main { font-size: 3rem; color: #ec407a; text-shadow: 0 0 10px #f48fb1; }
        input { padding: 15px; border-radius: 25px; border: 2px solid #ec407a; width: 250px; text-align: center; background: rgba(255,255,255,0.8); }
        button { padding: 15px 40px; margin-top: 20px; background: #ec407a; border: none; border-radius: 25px; color: white; cursor: pointer; }

        /* 2. الخلفية صورة واضحة بنسبة 70% */
        #main-content { display: none; padding: 20px; text-align: center; background: url('3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        #main-content::before { content: ""; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255, 240, 245, 0.7); z-index: 0; }
        
        .content-wrapper { position: relative; z-index: 1; }
        .hero-img { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #fff; margin-bottom: 20px; }
        
        /* 5. الصور تتحرك مع حركة الماوس/اللمس */
        .card { background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 20px; margin: 30px auto; max-width: 350px; transition: 0.5s; cursor: pointer; }
        .card:hover { transform: scale(1.05) rotate(2deg); }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }

        /* 3 & 5. قلوب واضحة بنسبة 70% */
        .heart { position: fixed; color: #ec407a; opacity: 0.7; pointer-events: none; z-index: 50; animation: fall 6s linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 class="hb-main">Happy Birthday Malak</h1>
        <input type="text" id="password" placeholder="اكتبي love">
        <button onclick="checkPass()">افتحي المفاجأة 💖</button>
    </div>

    <div id="main-content">
        <div class="content-wrapper">
            <h1>عيد ميلاد سعيد يا ملك عمري 🎂</h1>
            <img src="3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg" class="hero-img">

            <div class="card"><img src="3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg"><p>النهاردة يوم ميلادك يا أغلى الناس.</p></div>
            <div class="card"><img src="546be1fc-98e4-48ef-8a81-63ae519b0be2.jpeg"><p>وجودك هو اللي بيحلي أيامي.</p></div>
            
            <!-- 5. الرسالة الأخيرة أكبر -->
            <div style="background: rgba(255,255,255,0.9); padding: 40px; border-radius: 30px; margin: 50px auto; max-width: 700px; border: 2px solid #ec407a;">
                <h2 style="font-size: 2.5rem; color: #ec407a;">💌 رسالة من القلب</h2>
                <p style="line-height: 2; font-size: 1.8rem; font-weight: bold;">
                    يا ملك، كل سنة وانتي حبيبتي وشريكة عمري، الدنيا بيكي أجمل بكتير، بحبك يا أغلى ما عندي! 💖
                </p>
                <div style="font-size: 2rem;">❤️ Mohamed ❤️</div>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('password').value.toLowerCase() === 'love') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setInterval(createHeart, 400); // تفعيل القلوب
            } else { alert("الباسورد غلط يا روحي"); }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
        
        // تفعيل قلوب شاشة القفل
        setInterval(createHeart, 400);
    </script>
</body>
</html>
