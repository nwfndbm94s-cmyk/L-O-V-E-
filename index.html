<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mohamed & Malak 💖</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #1a001f, #000);
color:white;
}

/* 💖 hearts */
canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* 🔒 LOCK SCREEN */
#lock{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg, #000, #2a0033);
z-index:10;
transition:1s;
}

.name{
font-size:32px;
font-weight:bold;
background: linear-gradient(90deg, gold, white, gold);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

.sub{
opacity:0.7;
margin:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
text-align:center;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* unlock animation */
.unlock{
transform: translateY(-100%);
opacity:0;
}

/* 🌐 MAIN SITE */
#main{
display:none;
position:absolute;
width:100%;
height:100%;
overflow:auto;
z-index:5;
padding:20px;
text-align:center;
}

/* header */
.big{
font-size:34px;
font-weight:bold;
margin-top:20px;
background: linear-gradient(90deg, gold, white, gold);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: shine 3s linear infinite;
}

.romantic{
margin-top:10px;
opacity:0.8;
font-size:16px;
}

/* 🖼️ gallery */
.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
gap:10px;
}

.gallery img{
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
border:2px solid rgba(255,255,255,0.2);
}

/* 💌 quote */
.quote{
margin-top:20px;
font-style:italic;
opacity:0.8;
}

/* 🎵 button */
.play{
margin-top:20px;
padding:10px 20px;
border-radius:10px;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="hearts"></canvas>

<!-- 🔒 LOCK SCREEN -->
<div id="lock">
    <div class="name">𝑴𝒐𝒉𝒂𝒎𝒆𝒅 & 𝑴𝒂𝒍𝒂𝒌</div>
    <div class="sub">Enter password to unlock 💖</div>

    <input type="password" id="pass" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
</div>

<!-- 🌐 MAIN SITE -->
<div id="main">

    <div class="big">💖 Mohamed & Malak 💖</div>

    <div class="romantic">
        "Some people are written in your destiny forever..."
    </div>

    <!-- 🖼️ الصور (غير أسماء الصور براحتك) -->
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
    </div>

    <!-- 💌 جملة رومانسية -->
    <div class="quote">
        "You are my today, my tomorrow, and my forever 💍"
    </div>

    <!-- 🎵 تشغيل الأغنية -->
    <button class="play" onclick="document.getElementById('song').play()">
        ▶ Play Song
    </button>

    <audio id="song">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

</div>

<script>

/* 🔓 unlock */
function unlock(){
let p = document.getElementById("pass").value;

if(p === "love"){
document.getElementById("lock").classList.add("unlock");

setTimeout(()=>{
document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="block";
},800);

}else{
alert("Wrong password 💔");
}
}

/* 💖 hearts animation */
const canvas = document.getElementById("hearts");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

for(let i=0;i<70;i++){
hearts.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
r: Math.random()*6+2,
d: Math.random()*1+0.5
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,105,180,0.6)";

for(let h of hearts){
ctx.beginPath();
ctx.arc(h.x,h.y,h.r,0,Math.PI*2);
ctx.fill();

h.y -= h.d;

if(h.y<0){
h.y=canvas.height;
h.x=Math.random()*canvas.width;
}
}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
