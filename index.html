    * {
        font-family: 'Cairo', sans-serif;
    }
    
    :root {
        --kashmir: #D6A3A3;
        --kashmir-dark: #B68080;
        --white: #FFFFFF;
        --cream: #FFF9F7;
    }

    body {
        background: linear-gradient(135deg, #FFF9F7 0%, #FFEDED 100%);
        min-height: 100vh;
        overflow-x: hidden;
    }

    .lock-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 2.5s ease, visibility 2.5s ease;
    }

    .lock-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .lock-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.7;
        z-index: -1;
    }

    .lock-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(214,163,163,0.4) 0%, rgba(255,255,255,0.3) 100%);
        backdrop-filter: blur(8px);
    }

    .pulse-animation {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .shake {
        animation: shake 0.5s;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }

    .memory-card {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
    }

    .memory-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 20px 40px rgba(214,163,163,0.4);
    }

    .memory-card img {
        transition: transform 0.6s ease;
    }

    .memory-card:hover img {
        transform: scale(1.08);
    }

        height: 100%;
