<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Malak ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { margin: 0; background: #0f0518; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }

        /* شاشة القفل */
        #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #1a0b2e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hb-main { font-size: 3rem; color: #ff4081; text-shadow: 0 0 20px #ff4081; margin-bottom: 20px; }
        input { padding: 15px; border-radius: 25px; border: none; width: 250px; text-align: center; }
        button { padding: 15px 40px; margin-top: 20px; background: #ff4081; border: none; border-radius: 25px; color: white; cursor: pointer; transition: 0.3s; }

        /* المحتوى والأنيميشن */
        #main-content { display: none; padding: 20px; text-align: center; }
        .card { background: #2d1b4e; padding: 15px; border-radius: 20px; margin: 30px auto; max-width: 350px; 
                opacity: 0; transform: translateY(50px) scale(0.9); transition: all 1s ease; }
        .card.visible { opacity: 1; transform: translateY(0) scale(1); }
        .card:hover { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }

        /* الموسيقى والقلوب */
        .music-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #ff4081; padding: 10px 20px; border-radius: 50px; }
        .heart { position: fixed; color: #ff4081; pointer-events: none; z-index: 50; animation: up 5s linear infinite; }
        @keyframes up { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 class="hb-main">Happy Birthday Malak</h1>
        <input type="text" id="password" placeholder="اكتبي love">
        <button onclick="checkPass()">افتحي المفاجأة</button>
    </div>

    <div id="main-content">
        <h1>عيد ميلاد سعيد يا ملك عمري 🎂</h1>
        <div id="timer" style="color: #ff85a2; margin-bottom: 20px;"></div>
        
        <div class="card"><img src="3135284C-D0E2-438A-B210-BB2929FA1FCE.jpeg"><p>النهاردة عيد ميلاد الشخص اللي غير حياتي.</p></div>
        <div class="card"><img src="546be1fc-98e4-48ef-8a81-63ae519b0be2.jpeg"><p>كل سنة وانتي جنبي يا أحلى ملوكة.</p></div>
        <div class="card"><img src="IMG_4418.jpeg"><p>وجودك هو اللي بيحلي أيامي.</p></div>

        <div style="background: #2d1b4e; padding: 30px; border-radius: 20px; max-width: 500px; margin: 40px auto; border: 1px solid #ff4081;">
            <p>يا ملك، إنتي مش بس خطيبتي، إنتي دنيتي كلها.. كل سنة وانتي منورة حياتي.</p>
            <div style="font-size: 1.5rem; color: #ff4081;">❤️ Mohamed ❤️</div>
        </div>
    </div>

    <div class="music-float">
        <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>
        <button onclick="document.getElementById('bg-music').play()" style="background:none; border:none; color:white; cursor:pointer;">▶️ شغلي الأغنية</button>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('password').value.toLowerCase() === 'love') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setInterval(createHeart, 300); // قلوب مستمرة
            }
        }
        function createHeart() {
            const h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.card').forEach(c => {
                if(c.getBoundingClientRect().top < window.innerHeight - 100) c.classList.add('visible');
            });
        });
        setInterval(() => {
            const diff = new Date() - new Date("2024-06-28");
            document.getElementById('timer').innerText = `بقالنا ${Math.floor(diff / (1000*60*60*24))} يوم مع بعض ❤️`;
        }, 1000);
    </script>
</body>
</html>
